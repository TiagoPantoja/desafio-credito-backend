version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: teste-tecnico-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teste_tecnico
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: teste-tecnico-localstack
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-bank:
    build:
      context: ./mock-bank-server
    container_name: teste-tecnico-mock-bank
    environment:
      WEBHOOK_CALLBACK_URL: "http://api:8000/api/webhooks/bank-callback"
      PROCESSING_DELAY_MIN: "2"
      PROCESSING_DELAY_MAX: "5"
    ports:
      - "8001:8001"
    depends_on:
      - api

  # ──────────────────────────────────────────────
  # SUA API FASTAPI
  # ──────────────────────────────────────────────
  api:
    build: .
    container_name: teste-tecnico-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/teste_tecnico
      - SQS_ENDPOINT_URL=http://localstack:4566
      - EXTERNAL_BANK_URL=http://mock-bank:8001
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # SEU WORKER DE PROPOSTAS
  # ──────────────────────────────────────────────
  worker:
    build: .
    container_name: teste-tecnico-worker
    command: python -m app.workers.proposal_worker
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/teste_tecnico
      - SQS_ENDPOINT_URL=http://localstack:4566
      - EXTERNAL_BANK_URL=http://mock-bank:8001
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  pgdata: